[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/state"
  to = "/.netlify/functions/state"
  status = 200

[[redirects]]
  from = "/api/report-issue"
  to = "/.netlify/functions/report-issue"
  status = 200

[[redirects]]
  from = "/api/vendor-sms"
  to = "/.netlify/functions/vendor-sms"
  status = 200

[[redirects]]
  from = "/api/manager-agent"
  to = "/.netlify/functions/manager-agent"
  status = 200 
